<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Padel Bay</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --mint:       #94ceae;
      --teal:       #24646e;
      --teal-dark:  #1a4f58;
      --teal-light: #2d7a87;
      --sage:       #b5c5c0;
      --foam:       #d4e8e2;
      --bg:         #f0f5f4;
      --white:      #ffffff;
      --text:       #0f1f1d;
      --text-2:     #4a6a66;
      --text-3:     #8aada9;
      --border:     #e0edea;
      --red:        #ff5252;
      --green:      #2ecc8a;
      --r:          16px;
      --r-lg:       24px;
      --shadow-sm:  0 1px 4px rgba(15,31,29,.06);
      --shadow:     0 4px 24px rgba(15,31,29,.08);
      --shadow-lg:  0 8px 40px rgba(15,31,29,.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      background: var(--teal);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
    }
    .logo-mark {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--mint), #6dbf95);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .logo-text {
      font-size: 18px; font-weight: 800;
      color: #fff; letter-spacing: -.3px;
    }
    .logo-text span { color: var(--mint); }
    .admin-btn {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 10px;
      color: rgba(255,255,255,.9);
      font-size: 13px; font-weight: 600;
      padding: 7px 14px; cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background .2s;
      display: flex; align-items: center; gap: 5px;
    }
    .admin-btn:hover { background: rgba(255,255,255,.2); }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      padding: 20px 16px 110px;
      animation: fadeUp .25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0;
      width: 100%; max-width: 430px;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 10px 8px 26px;
      z-index: 100;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      cursor: pointer; padding: 6px 4px;
      color: var(--text-3); font-size: 10px; font-weight: 600;
      letter-spacing: .3px; text-transform: uppercase;
      transition: color .2s;
      border: none; background: none;
    }
    .nav-item .nav-icon {
      width: 44px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px; font-size: 20px;
      transition: background .2s;
    }
    .nav-item.active { color: var(--teal); }
    .nav-item.active .nav-icon { background: var(--foam); }

    /* ── HERO ── */
    .hero {
      border-radius: var(--r-lg);
      margin-bottom: 20px;
      position: relative; overflow: hidden;
      min-height: 320px;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .hero-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(15,31,29,.92) 0%, rgba(15,31,29,.4) 55%, rgba(15,31,29,.1) 100%);
    }
    .hero-content {
      position: relative; z-index: 2;
      padding: 24px;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 20px;
      padding: 4px 12px; font-size: 11px; font-weight: 600;
      letter-spacing: .5px; text-transform: uppercase;
      margin-bottom: 12px; color: #fff;
      backdrop-filter: blur(6px);
    }
    .hero h2 {
      font-size: 28px; font-weight: 900;
      letter-spacing: -.6px; line-height: 1.15;
      margin-bottom: 6px; color: #fff;
    }
    .hero p { font-size: 14px; color: rgba(255,255,255,.7); margin-bottom: 20px; }
    .hero-cta {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--mint);
      color: var(--teal-dark);
      font-size: 14px; font-weight: 800;
      padding: 12px 22px; border-radius: 12px;
      border: none; cursor: pointer;
      box-shadow: 0 4px 16px rgba(148,206,174,.4);
      transition: transform .15s, box-shadow .15s;
    }
    .hero-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(148,206,174,.5); }
    .hero-cta:active { transform: scale(.97); }

    /* ── BALLS BANNER ── */
    .balls-banner {
      border-radius: var(--r);
      overflow: hidden;
      height: 90px;
      position: relative;
      margin-bottom: 24px;
    }
    .balls-banner img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
    }
    .balls-banner-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(36,100,110,.85) 0%, rgba(36,100,110,.4) 60%, transparent 100%);
      display: flex; align-items: center;
      padding: 0 20px; gap: 10px;
    }
    .balls-banner-text {
      color: #fff; font-size: 15px; font-weight: 800;
      letter-spacing: -.2px; line-height: 1.3;
    }
    .balls-banner-sub { font-size: 11px; color: rgba(255,255,255,.7); font-weight: 500; margin-top: 2px; }

    /* ── STATS ── */
    .stats-row {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 10px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--white);
      border-radius: var(--r);
      padding: 16px 12px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .stat-num {
      font-size: 28px; font-weight: 900;
      color: var(--teal); letter-spacing: -1px;
    }
    .stat-label { font-size: 10px; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

    /* ── SECTION TITLE ── */
    .section-title {
      font-size: 13px; font-weight: 700;
      color: var(--text-3); text-transform: uppercase;
      letter-spacing: .8px; margin-bottom: 12px;
    }

    /* ── COURT CARDS ── */
    .court-card {
      background: var(--white);
      border-radius: var(--r);
      padding: 16px 18px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
      border: 2px solid transparent;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .15s;
    }
    .court-card:hover { border-color: var(--foam); box-shadow: var(--shadow); transform: translateY(-1px); }
    .court-card.selected { border-color: var(--teal); background: #f5fbf9; }
    .court-left { display: flex; align-items: center; gap: 14px; }
    .court-icon-wrap {
      width: 48px; height: 48px;
      background: var(--foam);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .court-name { font-size: 15px; font-weight: 700; letter-spacing: -.2px; }
    .court-type { font-size: 12px; color: var(--text-3); margin-top: 2px; font-weight: 500; }
    .avail-badge {
      font-size: 11px; font-weight: 700;
      padding: 5px 11px; border-radius: 20px;
      letter-spacing: .2px;
    }
    .avail-open { background: #e8f9f1; color: var(--green); }
    .avail-full  { background: #fff0f0; color: var(--red); }

    /* ── DATE STRIP ── */
    .date-strip {
      display: flex; gap: 8px;
      overflow-x: auto; padding-bottom: 6px; margin-bottom: 24px;
      scrollbar-width: none;
    }
    .date-strip::-webkit-scrollbar { display: none; }
    .date-pill {
      flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 14px; border-radius: 14px;
      background: var(--white); border: 2px solid var(--border);
      cursor: pointer; transition: all .2s; min-width: 58px;
    }
    .date-pill .dn { font-size: 10px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .5px; }
    .date-pill .dd { font-size: 22px; font-weight: 900; color: var(--text); margin: 2px 0; letter-spacing: -1px; }
    .date-pill .dm { font-size: 10px; color: var(--text-3); font-weight: 600; }
    .date-pill.active { background: var(--teal); border-color: var(--teal); }
    .date-pill.active .dn,
    .date-pill.active .dd,
    .date-pill.active .dm { color: #fff; }

    /* ── TIME GRID ── */
    .time-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-bottom: 24px;
    }
    .time-slot {
      padding: 13px 6px; border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--white);
      text-align: center; cursor: pointer;
      font-size: 13px; font-weight: 700; color: var(--text);
      transition: all .18s;
    }
    .time-slot:hover:not(.booked) { border-color: var(--mint); background: #f5fbf9; }
    .time-slot.active { background: var(--teal); border-color: var(--teal); color: #fff; box-shadow: 0 4px 12px rgba(36,100,110,.25); }
    .time-slot.booked { background: var(--bg); border-color: var(--border); color: var(--text-3); cursor: not-allowed; font-weight: 500; text-decoration: line-through; }

    /* ── STEPS ── */
    .steps {
      display: flex; align-items: center;
      margin-bottom: 24px; gap: 0;
    }
    .step {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; color: var(--text-3);
      text-transform: uppercase; letter-spacing: .5px;
    }
    .step-dot {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--border); color: var(--text-3);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; flex-shrink: 0;
    }
    .step.done .step-dot { background: var(--green); color: #fff; }
    .step.active .step-dot { background: var(--teal); color: #fff; }
    .step.active { color: var(--teal); }
    .step-line { flex: 1; height: 2px; background: var(--border); margin: 0 8px; border-radius: 2px; }
    .step-line.done { background: var(--green); }

    /* ── SUMMARY CHIP ── */
    .summary-chip {
      background: var(--white);
      border-radius: var(--r);
      padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }
    .summary-chip-left { display: flex; align-items: center; gap: 12px; }
    .summary-chip-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--foam);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .summary-chip-title { font-size: 14px; font-weight: 700; }
    .summary-chip-sub { font-size: 12px; color: var(--text-3); margin-top: 1px; }

    /* ── FORM ── */
    .form-card {
      background: var(--white);
      border-radius: var(--r-lg);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 16px;
    }
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block; font-size: 11px; font-weight: 700;
      color: var(--text-3); text-transform: uppercase;
      letter-spacing: .6px; margin-bottom: 7px;
    }
    .field input {
      width: 100%; padding: 13px 14px;
      border: 1.5px solid var(--border); border-radius: 12px;
      font-size: 15px; color: var(--text);
      background: var(--bg); font-family: inherit;
      transition: border-color .2s, background .2s;
      -webkit-appearance: none;
    }
    .field input::placeholder { color: var(--text-3); }
    .field input:focus { outline: none; border-color: var(--teal); background: var(--white); }

    /* ── BUTTONS ── */
    .btn {
      display: block; width: 100%;
      padding: 15px; border: none; border-radius: 14px;
      font-size: 15px; font-weight: 800; cursor: pointer;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      font-family: inherit; letter-spacing: -.1px;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary {
      background: var(--teal);
      color: #fff;
      box-shadow: 0 4px 16px rgba(36,100,110,.25);
    }
    .btn-primary:not(:disabled):hover { box-shadow: 0 6px 20px rgba(36,100,110,.35); transform: translateY(-1px); }
    .btn-ghost {
      background: var(--foam);
      color: var(--teal);
    }
    .btn-danger {
      background: var(--red);
      color: #fff;
      box-shadow: 0 4px 12px rgba(255,82,82,.25);
    }
    .btn-sm {
      padding: 9px 18px; border-radius: 10px;
      font-size: 13px; width: auto; display: inline-flex;
      align-items: center; gap: 5px;
    }
    .mt-10 { margin-top: 10px; }
    .mt-16 { margin-top: 16px; }
    .mt-20 { margin-top: 20px; }

    /* ── BACK BTN ── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; border: none;
      color: var(--teal); font-size: 14px; font-weight: 700;
      cursor: pointer; margin-bottom: 20px; padding: 0;
      font-family: inherit;
    }
    .back-btn:hover { opacity: .7; }

    /* ── BOOKING CARD ── */
    .booking-card {
      background: var(--white);
      border-radius: var(--r);
      padding: 16px 18px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-sm);
      border-left: 3px solid var(--mint);
      transition: box-shadow .2s;
    }
    .booking-card:hover { box-shadow: var(--shadow); }
    .booking-card.cancelled { border-left-color: var(--red); opacity: .65; }
    .bc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .bc-name { font-size: 15px; font-weight: 800; letter-spacing: -.2px; }
    .bc-court { font-size: 12px; color: var(--text-3); margin-top: 2px; font-weight: 500; }
    .bc-meta { display: flex; flex-wrap: wrap; gap: 10px; }
    .bc-meta-item {
      display: flex; align-items: center; gap: 4px;
      font-size: 12px; color: var(--text-2); font-weight: 500;
      background: var(--bg); padding: 4px 9px; border-radius: 8px;
    }
    .status-badge {
      font-size: 11px; font-weight: 700;
      padding: 4px 10px; border-radius: 20px; letter-spacing: .2px;
    }
    .status-confirmed { background: #e8f9f1; color: var(--green); }
    .status-cancelled  { background: #fff0f0; color: var(--red); }
    .status-completed  { background: var(--foam); color: var(--teal); }

    /* ── CONFIRM SCREEN ── */
    .success-icon {
      width: 88px; height: 88px;
      background: linear-gradient(135deg, #e8f9f1, var(--foam));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; margin: 8px auto 20px;
    }
    .booking-id-box {
      background: var(--teal);
      border-radius: var(--r);
      padding: 16px;
      text-align: center; margin-bottom: 16px;
    }
    .booking-id-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.6); text-transform: uppercase; letter-spacing: 1px; }
    .booking-id-val { font-size: 28px; font-weight: 900; color: #fff; letter-spacing: 4px; margin-top: 4px; }

    /* ── DETAIL ROW ── */
    .detail-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .detail-row:last-child { border-bottom: none; }
    .dl { font-size: 13px; color: var(--text-3); font-weight: 500; }
    .dv { font-size: 14px; font-weight: 700; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center; padding: 48px 20px;
    }
    .empty-icon { font-size: 52px; margin-bottom: 14px; }
    .empty-state h3 { font-size: 17px; font-weight: 800; margin-bottom: 6px; }
    .empty-state p { font-size: 13px; color: var(--text-3); line-height: 1.6; }

    /* ── SEARCH ── */
    .search-wrap {
      display: flex; gap: 8px; margin-bottom: 20px;
    }
    .search-wrap input {
      flex: 1; padding: 13px 16px;
      border: 1.5px solid var(--border); border-radius: 12px;
      font-size: 15px; background: var(--white);
      font-family: inherit; color: var(--text);
      transition: border-color .2s;
    }
    .search-wrap input:focus { outline: none; border-color: var(--teal); }
    .search-wrap button {
      padding: 13px 18px; background: var(--teal);
      color: #fff; border: none; border-radius: 12px;
      font-weight: 700; cursor: pointer; font-size: 14px;
      font-family: inherit;
    }

    /* ── TAB BAR ── */
    .tab-bar {
      display: flex; background: var(--white);
      border-radius: 12px; padding: 4px;
      margin-bottom: 16px; gap: 2px;
      box-shadow: var(--shadow-sm);
    }
    .tab {
      flex: 1; padding: 9px 6px; border: none; background: none;
      border-radius: 9px; font-size: 12px; font-weight: 700;
      color: var(--text-3); cursor: pointer; transition: all .2s;
      font-family: inherit;
    }
    .tab.active { background: var(--teal); color: #fff; box-shadow: 0 2px 8px rgba(36,100,110,.2); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,31,29,.5);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity .25s;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-sheet {
      background: var(--white);
      border-radius: 24px 24px 0 0;
      padding: 28px 20px 36px;
      width: 100%; max-width: 430px;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border); border-radius: 4px;
      margin: 0 auto 20px;
    }
    .modal-title { font-size: 18px; font-weight: 800; text-align: center; margin-bottom: 20px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--text); color: #fff;
      padding: 12px 22px; border-radius: 12px;
      font-size: 13px; font-weight: 600;
      opacity: 0; transition: all .3s;
      pointer-events: none; z-index: 999;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── TODAY BOOKINGS ── */
    .today-empty {
      background: var(--white); border-radius: var(--r);
      padding: 20px; text-align: center;
      color: var(--text-3); font-size: 13px; font-weight: 500;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">
      <div class="logo-mark">🎾</div>
      <div class="logo-text">Padel <span>Bay</span></div>
    </div>
    <button class="admin-btn" onclick="showAdminModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Admin
    </button>
  </div>

  <div class="content" id="content"></div>

  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-home" onclick="navigate('home')">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      Home
    </button>
    <button class="nav-item" id="nav-book" onclick="navigate('book')">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      Book
    </button>
    <button class="nav-item" id="nav-mybookings" onclick="navigate('mybookings')">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      My Bookings
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<!-- Admin Modal -->
<div class="modal-overlay" id="adminModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="adminModalTitle">Admin Access</div>
    <div id="adminModalContent"></div>
  </div>
</div>

<!-- Cancel Modal -->
<div class="modal-overlay" id="cancelModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Cancel Booking?</div>
    <p style="text-align:center;color:var(--text-3);font-size:13px;margin-bottom:24px;line-height:1.6">This will free up the slot for others. This action cannot be undone.</p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" onclick="closeModal('cancelModal')">Keep it</button>
      <button class="btn btn-danger" onclick="confirmCancel()">Yes, Cancel</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const ADMIN_PASS = 'padelbay2024';
const COURTS = [
  { id: 1, name: 'Court 1', type: 'Outdoor · Glass Back' },
  { id: 2, name: 'Court 2', type: 'Outdoor · Panoramic' },
  { id: 3, name: 'Court 3', type: 'Indoor · Premium' },
];
const HOURS = [
  '7:00 AM','8:00 AM','9:00 AM','10:00 AM','11:00 AM','12:00 PM',
  '1:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM','6:00 PM',
  '7:00 PM','8:00 PM','9:00 PM','10:00 PM'
];

// ── STATE ──
let bookings     = JSON.parse(localStorage.getItem('pbBookings') || '[]');
let view         = 'home';
let adminLoggedIn = false;
let bDate = '', bCourt = null, bTime = '', bStep = 1;
let cancelId = null;
let mbPhone = '';
let adminTab = 'all';

function save() { localStorage.setItem('pbBookings', JSON.stringify(bookings)); }
function genId() { return 'PB' + Date.now().toString(36).toUpperCase().slice(-5); }

// ── NAVIGATION ──
function navigate(v) {
  view = v;
  if (v === 'book') { bStep = 1; bDate = ''; bCourt = null; bTime = ''; }
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const ni = document.getElementById('nav-' + v);
  if (ni) ni.classList.add('active');
  render();
}

function render() {
  const c = document.getElementById('content');
  c.innerHTML = '';
  if (view === 'home')       c.innerHTML = renderHome();
  else if (view === 'book')  c.innerHTML = renderBook();
  else if (view === 'mybookings') c.innerHTML = renderMyBookings();
  else if (view === 'admin') c.innerHTML = renderAdmin();
}

// ── HOME ──
function renderHome() {
  const today = todayDate();
  const todayB = bookings.filter(b => b.date === today && b.status !== 'cancelled');
  const freeCount = COURTS.length - new Set(todayB.map(b => b.court)).size;

  return `
    <div class="hero">
      <img class="hero-img" src="player.jpg" alt="Padel Bay" />
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="hero-badge">🎾 3 Courts Available</div>
        <h2>Book your court,<br>play your game.</h2>
        <p>Quick and easy court reservations at Padel Bay.</p>
        <button class="hero-cta" onclick="navigate('book')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Book a Court
        </button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num">${todayB.length}</div>
        <div class="stat-label">Today</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${freeCount < 0 ? 0 : freeCount}</div>
        <div class="stat-label">Courts Free</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${bookings.filter(b => b.status !== 'cancelled').length}</div>
        <div class="stat-label">All Time</div>
      </div>
    </div>

    <div class="balls-banner">
      <img src="balls.jpg" alt="" />
      <div class="balls-banner-overlay">
        <div>
          <div class="balls-banner-text">3 Premium Courts</div>
          <div class="balls-banner-sub">Outdoor & Indoor · Open daily 7am–10pm</div>
        </div>
      </div>
    </div>

    <div class="section-title">Our Courts</div>
    ${COURTS.map(court => {
      const slots = bookedSlotsFor(court.id, today);
      const free = HOURS.length - slots.length;
      return `
        <div class="court-card" onclick="quickBook(${court.id})">
          <div class="court-left">
            <div class="court-icon-wrap">🎾</div>
            <div>
              <div class="court-name">${court.name}</div>
              <div class="court-type">${court.type}</div>
            </div>
          </div>
          <div class="avail-badge ${free > 0 ? 'avail-open' : 'avail-full'}">
            ${free > 0 ? free + ' free' : 'Full'}
          </div>
        </div>`;
    }).join('')}

    ${todayB.length > 0 ? `
      <div class="section-title mt-20">Today's Bookings</div>
      ${todayB.slice(0, 3).map(b => bookingCard(b, false)).join('')}
    ` : `
      <div class="section-title mt-20">Today's Bookings</div>
      <div class="today-empty">No bookings yet today</div>
    `}
  `;
}

function quickBook(courtId) {
  bCourt = courtId; bDate = todayDate(); bStep = 2; navigate('book');
}

// ── BOOK ──
function renderBook() {
  if (bStep === 1) return renderStep1();
  if (bStep === 2) return renderStep2();
  if (bStep === 3) return renderStep3();
  if (bStep === 4) return renderConfirm();
}

function renderStep1() {
  const dates = getDateOptions(14);
  return `
    ${stepsBar(1)}
    <div class="section-title">Select Date</div>
    <div class="date-strip">
      ${dates.map(d => `
        <div class="date-pill ${bDate === d.value ? 'active' : ''}" onclick="selectDate('${d.value}')">
          <span class="dn">${d.dayName}</span>
          <span class="dd">${d.dayNum}</span>
          <span class="dm">${d.month}</span>
        </div>`).join('')}
    </div>
    <div class="section-title">Select Court</div>
    ${COURTS.map(c => {
      const slots = bDate ? bookedSlotsFor(c.id, bDate) : [];
      const free = HOURS.length - slots.length;
      return `
        <div class="court-card ${bCourt === c.id ? 'selected' : ''}" onclick="selectCourt(${c.id})">
          <div class="court-left">
            <div class="court-icon-wrap">🎾</div>
            <div>
              <div class="court-name">${c.name}</div>
              <div class="court-type">${c.type}</div>
            </div>
          </div>
          ${bDate ? `<div class="avail-badge ${free > 0 ? 'avail-open' : 'avail-full'}">${free > 0 ? free + ' free' : 'Full'}</div>` : ''}
        </div>`;
    }).join('')}
    <button class="btn btn-primary mt-16" onclick="goStep2()" ${!bDate || !bCourt ? 'disabled' : ''}>Continue →</button>
  `;
}

function renderStep2() {
  const booked = bookedSlotsFor(bCourt, bDate);
  const court = COURTS.find(c => c.id === bCourt);
  return `
    ${stepsBar(2)}
    <button class="back-btn" onclick="bStep=1;render()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <div class="summary-chip">
      <div class="summary-chip-left">
        <div class="summary-chip-icon">🎾</div>
        <div>
          <div class="summary-chip-title">${court.name}</div>
          <div class="summary-chip-sub">${formatDate(bDate)}</div>
        </div>
      </div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
    <div class="section-title">Select Time Slot</div>
    <div class="time-grid">
      ${HOURS.map(h => {
        const busy = booked.includes(h);
        return `<div class="time-slot ${busy ? 'booked' : ''} ${bTime === h && !busy ? 'active' : ''}"
          onclick="${busy ? '' : `selectTime('${h}')`}">${h}</div>`;
      }).join('')}
    </div>
    <button class="btn btn-primary" onclick="goStep3()" ${!bTime ? 'disabled' : ''}>Continue →</button>
  `;
}

function renderStep3() {
  const court = COURTS.find(c => c.id === bCourt);
  return `
    ${stepsBar(3)}
    <button class="back-btn" onclick="bStep=2;render()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <div class="form-card" style="margin-bottom:16px">
      <div class="detail-row"><span class="dl">Court</span><span class="dv">${court.name}</span></div>
      <div class="detail-row"><span class="dl">Date</span><span class="dv">${formatDate(bDate)}</span></div>
      <div class="detail-row"><span class="dl">Time</span><span class="dv">${bTime}</span></div>
    </div>
    <div class="section-title">Your Details</div>
    <div class="form-card">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="inp-name" placeholder="e.g. Omar Jheir" />
      </div>
      <div class="field">
        <label>Phone Number</label>
        <input type="tel" id="inp-phone" placeholder="+971 50 123 4567" />
      </div>
      <div class="field">
        <label>Email (optional)</label>
        <input type="email" id="inp-email" placeholder="your@email.com" />
      </div>
      <div class="field">
        <label>Note (optional)</label>
        <input type="text" id="inp-note" placeholder="e.g. 4 players, need balls" />
      </div>
    </div>
    <button class="btn btn-primary" onclick="submitBooking()">Confirm Booking</button>
  `;
}

function renderConfirm() {
  const last = bookings[bookings.length - 1];
  if (!last) { navigate('home'); return ''; }
  const court = COURTS.find(c => c.id === last.court);
  return `
    <div style="text-align:center;padding:10px 0 4px">
      <div class="success-icon">✅</div>
      <h2 style="font-size:22px;font-weight:900;letter-spacing:-.4px;margin-bottom:6px">You're all set!</h2>
      <p style="font-size:14px;color:var(--text-3)">See you on the court, ${last.name.split(' ')[0]}.</p>
    </div>
    <div class="booking-id-box mt-20">
      <div class="booking-id-label">Booking ID</div>
      <div class="booking-id-val">${last.id}</div>
    </div>
    <div class="form-card">
      <div class="detail-row"><span class="dl">Court</span><span class="dv">${court.name}</span></div>
      <div class="detail-row"><span class="dl">Date</span><span class="dv">${formatDate(last.date)}</span></div>
      <div class="detail-row"><span class="dl">Time</span><span class="dv">${last.time}</span></div>
      <div class="detail-row"><span class="dl">Name</span><span class="dv">${last.name}</span></div>
      <div class="detail-row"><span class="dl">Phone</span><span class="dv">${last.phone}</span></div>
    </div>
    <button class="btn btn-ghost mt-10" onclick="navigate('home')">Back to Home</button>
    <button class="btn btn-primary mt-10" onclick="navigate('book')">Book Another Court</button>
  `;
}

function stepsBar(active) {
  const labels = ['Date & Court', 'Time Slot', 'Your Info'];
  return `<div class="steps">
    ${labels.map((l, i) => {
      const n = i + 1;
      const cls = n < active ? 'done' : n === active ? 'active' : '';
      return `${i > 0 ? `<div class="step-line ${n <= active ? 'done' : ''}"></div>` : ''}
        <div class="step ${cls}"><div class="step-dot">${n < active ? '✓' : n}</div>${n === active ? `<span>${l}</span>` : ''}</div>`;
    }).join('')}
  </div>`;
}

function goStep2() { if (!bDate || !bCourt) return toast('Select a date and court'); bStep=2; render(); }
function goStep3() { if (!bTime) return toast('Select a time slot'); bStep=3; render(); }
function selectDate(d) { bDate=d; render(); }
function selectCourt(id) { bCourt=id; render(); }
function selectTime(t) { bTime=t; render(); }

function submitBooking() {
  const name  = document.getElementById('inp-name')?.value.trim();
  const phone = document.getElementById('inp-phone')?.value.trim();
  const email = document.getElementById('inp-email')?.value.trim();
  const note  = document.getElementById('inp-note')?.value.trim();
  if (!name)  return toast('Please enter your name');
  if (!phone) return toast('Please enter your phone number');
  if (bookedSlotsFor(bCourt, bDate).includes(bTime)) return toast('Slot just got booked — pick another');
  bookings.push({ id: genId(), court: bCourt, date: bDate, time: bTime, name, phone, email, note, status: 'confirmed', createdAt: new Date().toISOString() });
  save(); bStep = 4; render();
}

// ── MY BOOKINGS ──
function renderMyBookings() {
  const filtered = mbPhone
    ? bookings.filter(b => b.phone.replace(/\s/g,'').includes(mbPhone.replace(/\s/g,'')))
    : [];
  return `
    <div class="section-title">Find Your Booking</div>
    <div class="search-wrap">
      <input type="tel" id="mb-inp" placeholder="Enter your phone number" value="${mbPhone}"
        onkeydown="if(event.key==='Enter')searchMB()" />
      <button onclick="searchMB()">Search</button>
    </div>
    ${mbPhone && !filtered.length ? `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <h3>No bookings found</h3>
        <p>No bookings match this phone number.<br>Try a different number.</p>
      </div>` : ''}
    ${filtered.slice().reverse().map(b => bookingCard(b, true)).join('')}
  `;
}
function searchMB() { mbPhone = document.getElementById('mb-inp')?.value.trim(); render(); }

// ── ADMIN ──
function renderAdmin() {
  const today = todayDate();
  let list = bookings;
  if (adminTab === 'today')     list = bookings.filter(b => b.date === today);
  if (adminTab === 'upcoming')  list = bookings.filter(b => b.date >= today && b.status !== 'cancelled');
  if (adminTab === 'cancelled') list = bookings.filter(b => b.status === 'cancelled');
  const confirmed = bookings.filter(b => b.status !== 'cancelled').length;
  const todayCount = bookings.filter(b => b.date === today && b.status !== 'cancelled').length;
  const cancelledCount = bookings.filter(b => b.status === 'cancelled').length;
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="section-title" style="margin:0">Admin Panel</div>
      <button class="btn btn-primary btn-sm" onclick="navigate('book')">+ New</button>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${todayCount}</div><div class="stat-label">Today</div></div>
      <div class="stat-card"><div class="stat-num">${confirmed}</div><div class="stat-label">Confirmed</div></div>
      <div class="stat-card"><div class="stat-num">${cancelledCount}</div><div class="stat-label">Cancelled</div></div>
    </div>
    <div class="tab-bar">
      <button class="tab ${adminTab==='all'?'active':''}" onclick="setAdminTab('all')">All</button>
      <button class="tab ${adminTab==='today'?'active':''}" onclick="setAdminTab('today')">Today</button>
      <button class="tab ${adminTab==='upcoming'?'active':''}" onclick="setAdminTab('upcoming')">Upcoming</button>
      <button class="tab ${adminTab==='cancelled'?'active':''}" onclick="setAdminTab('cancelled')">Cancelled</button>
    </div>
    ${!list.length ? `<div class="empty-state"><div class="empty-icon">📋</div><h3>Nothing here</h3><p>Bookings will appear once they're made.</p></div>` : list.slice().reverse().map(b => bookingCard(b, true)).join('')}
  `;
}
function setAdminTab(t) { adminTab=t; render(); }

// ── BOOKING CARD ──
function bookingCard(b, showCancel) {
  const court = COURTS.find(c => c.id === b.court)?.name || 'Court';
  const isPast = b.date < todayDate();
  const statusClass = b.status === 'cancelled' ? 'status-cancelled' : isPast ? 'status-completed' : 'status-confirmed';
  const statusLabel = b.status === 'cancelled' ? 'Cancelled' : isPast ? 'Completed' : 'Confirmed';
  return `
    <div class="booking-card ${b.status==='cancelled'?'cancelled':''}">
      <div class="bc-top">
        <div>
          <div class="bc-name">${b.name}</div>
          <div class="bc-court">${court}</div>
        </div>
        <span class="status-badge ${statusClass}">${statusLabel}</span>
      </div>
      <div class="bc-meta">
        <div class="bc-meta-item">📅 ${formatDate(b.date)}</div>
        <div class="bc-meta-item">⏰ ${b.time}</div>
        <div class="bc-meta-item">📞 ${b.phone}</div>
        ${b.id ? `<div class="bc-meta-item">🆔 ${b.id}</div>` : ''}
      </div>
      ${b.note ? `<div style="font-size:12px;color:var(--text-3);margin-top:8px;padding:6px 10px;background:var(--bg);border-radius:8px">📝 ${b.note}</div>` : ''}
      ${showCancel && b.status !== 'cancelled' && !isPast ? `
        <div style="margin-top:12px">
          <button class="btn btn-danger btn-sm" onclick="requestCancel('${b.id}')">Cancel Booking</button>
        </div>` : ''}
    </div>`;
}

// ── CANCEL ──
function requestCancel(id) { cancelId=id; openModal('cancelModal'); }
function confirmCancel() {
  const idx = bookings.findIndex(b => b.id === cancelId);
  if (idx !== -1) { bookings[idx].status = 'cancelled'; save(); toast('Booking cancelled'); }
  closeModal('cancelModal'); render();
}

// ── ADMIN MODAL ──
function showAdminModal() {
  document.getElementById('adminModalTitle').textContent = adminLoggedIn ? '⚙ Admin Panel' : '🔐 Admin Access';
  document.getElementById('adminModalContent').innerHTML = adminLoggedIn ? `
    <p style="text-align:center;color:var(--text-3);font-size:13px;margin-bottom:20px">Logged in as Administrator</p>
    <button class="btn btn-primary" onclick="closeModal('adminModal');view='admin';document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));render()">Open Admin Panel</button>
    <button class="btn btn-ghost mt-10" onclick="adminLoggedIn=false;toast('Logged out');closeModal('adminModal')">Log out</button>
  ` : `
    <div class="field"><label>Password</label><input type="password" id="admin-pass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')tryLogin()" /></div>
    <button class="btn btn-primary" onclick="tryLogin()">Login</button>
    <button class="btn btn-ghost mt-10" onclick="closeModal('adminModal')">Cancel</button>
  `;
  openModal('adminModal');
  setTimeout(() => document.getElementById('admin-pass')?.focus(), 350);
}
function tryLogin() {
  const p = document.getElementById('admin-pass')?.value;
  if (p === ADMIN_PASS) {
    adminLoggedIn = true; closeModal('adminModal');
    view='admin'; document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    render(); toast('Welcome, Admin 👋');
  } else { toast('Wrong password'); }
}

// ── MODALS ──
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.getElementById('adminModal').addEventListener('click', e => { if (e.target.id==='adminModal') closeModal('adminModal'); });
document.getElementById('cancelModal').addEventListener('click', e => { if (e.target.id==='cancelModal') closeModal('cancelModal'); });

// ── HELPERS ──
function bookedSlotsFor(cId, date) {
  return bookings.filter(b => b.court===cId && b.date===date && b.status!=='cancelled').map(b => b.time);
}
function todayDate() { return new Date().toISOString().split('T')[0]; }
function formatDate(s) {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'long', year:'numeric' });
}
function getDateOptions(n) {
  return Array.from({length:n}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate()+i);
    return { value: d.toISOString().split('T')[0], dayName: d.toLocaleDateString('en-GB',{weekday:'short'}), dayNum: d.getDate(), month: d.toLocaleDateString('en-GB',{month:'short'}) };
  });
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

render();
</script>
</body>
</html>
